<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jibu | The Answer to Every Thirst</title>
  <meta name="description" content="Discover the answer to your thirst. A Better Life with Jibu.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,500;0,700;1,500;1,700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div id="app">
    <section class="hero">
      <div class="content">
        <img src="/africa_map_all_8.png" class="africa-map-bg" alt="Africa Map Background" />
        <div class="image-wrapper" id="hover-reveal-wrapper">
          <img src="thirsty_african_man.png" alt="Thirsty African Man Illustration" class="thirst-image" />
        </div>
        <h1 class="question-text">
          What is the <span class="highlight">Answer</span> to your <span class="highlight">Thirst</span><span
            class="question-mark">?</span>
        </h1>

        <div class="bubbles-container">
          <div class="bubble bubble-1"></div>
          <div class="bubble bubble-2"></div>
          <div class="bubble bubble-3"></div>
        </div>
      </div>

    </section>

    <section class="reveal-section">
      <div class="reveal-content">
        <img src="/jibu-logo-white.png" alt="Jibu Logo" class="jibu-logo" />
        <h2 class="tagline">The answer to every thirst.</h2>
        <p class="sub-tagline">A Better Life.</p>
      </div>

      <div class="marquee-container">
        <div class="marquee-content">
          <span class="marquee-label">Proudly Serving:</span>
          <img src="https://flagcdn.com/w40/bi.png" alt="Burundi" /> <span>Burundi</span> <span
            class="dot">&bull;</span>
          <img src="https://flagcdn.com/w40/cd.png" alt="DRC" /> <span>DRC</span> <span class="dot">&bull;</span>
          <img src="https://flagcdn.com/w40/gh.png" alt="Ghana" /> <span>Ghana</span> <span class="dot">&bull;</span>
          <img src="https://flagcdn.com/w40/ke.png" alt="Kenya" /> <span>Kenya</span> <span class="dot">&bull;</span>
          <img src="https://flagcdn.com/w40/rw.png" alt="Rwanda" /> <span>Rwanda</span> <span class="dot">&bull;</span>
          <img src="https://flagcdn.com/w40/tz.png" alt="Tanzania" /> <span>Tanzania</span> <span
            class="dot">&bull;</span>
          <img src="https://flagcdn.com/w40/ug.png" alt="Uganda" /> <span>Uganda</span> <span class="dot">&bull;</span>
          <img src="https://flagcdn.com/w40/zm.png" alt="Zambia" /> <span>Zambia</span> <span class="dot">&bull;</span>

          <span class="marquee-label">Proudly Serving:</span>
          <img src="https://flagcdn.com/w40/bi.png" alt="Burundi" /> <span>Burundi</span> <span
            class="dot">&bull;</span>
          <img src="https://flagcdn.com/w40/cd.png" alt="DRC" /> <span>DRC</span> <span class="dot">&bull;</span>
          <img src="https://flagcdn.com/w40/gh.png" alt="Ghana" /> <span>Ghana</span> <span class="dot">&bull;</span>
          <img src="https://flagcdn.com/w40/ke.png" alt="Kenya" /> <span>Kenya</span> <span class="dot">&bull;</span>
          <img src="https://flagcdn.com/w40/rw.png" alt="Rwanda" /> <span>Rwanda</span> <span class="dot">&bull;</span>
          <img src="https://flagcdn.com/w40/tz.png" alt="Tanzania" /> <span>Tanzania</span> <span
            class="dot">&bull;</span>
          <img src="https://flagcdn.com/w40/ug.png" alt="Uganda" /> <span>Uganda</span> <span class="dot">&bull;</span>
          <img src="https://flagcdn.com/w40/zm.png" alt="Zambia" /> <span>Zambia</span> <span class="dot">&bull;</span>
        </div>
      </div>
    </section>
  </div>
  <script type="module" src="/main.js"></script>
</body>

</html>
